[build]
  # 构建命令：在根目录执行
  command = "npm install && npm run build"
  # 发布目录：构建输出目录
  publish = "dist"
  
# 构建环境变量
[build.environment]
  # 指定 Node.js 版本（推荐使用 18 或 20）
  NODE_VERSION = "18"

# 重定向规则：支持 React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 环境变量（在 Netlify 控制台中设置）
# 需要在 Netlify Dashboard → Site settings → Environment variables 中设置：
# - VITE_API_URL: 后端API地址（如果使用外部API）
